<!DOCTYPE html>
<!--
  GitHub Project Pages (https://USER.github.io/REPO/): set data-site-root="/REPO/"
  on <html> so CSS and scripts load when this page is shown for a missing URL.
  Omit or leave empty for a username.github.io user/org site or local preview.
-->
<html lang="en" data-site-root="">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var root = document.documentElement.getAttribute("data-site-root");
        if (!root || !root.trim()) return;
        var href = root.endsWith("/") ? root : root + "/";
        var base = document.createElement("base");
        base.href = href;
        document.head.insertBefore(base, document.head.firstChild);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found</title>
    <meta name="robots" content="noindex" />

      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
